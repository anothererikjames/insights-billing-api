name: Postman Collection Run
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  postman:
    runs-on: ubuntu-latest
    name: Run Billing Tests
    steps:
      - uses: actions/checkout@v4

      - name: Run Postman Collection
        uses: postmanlabs/postman-cli-action@v1
        with:
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          collection: 52238111-6c5c1993-fc5c-4755-b546-d32e10955e26
          environment: 52983738-9826bb09-d3aa-42f3-923d-32540e156b1e
          verbose: true
